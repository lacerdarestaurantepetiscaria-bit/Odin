{% extends "base.html" %}
{% block page_title %}Clientes{% endblock %}
{% block page_subtitle %}Cadastro rápido{% endblock %}
{% block content %}
<article class="form-panel">
  <div class="form-side">
    <span class="eyebrow">NOVO CLIENTE</span>
    <h2>{{ title }}</h2>
    <p>Cadastre nome, telefone e endereço para pedidos no balcão e delivery.</p>
  </div>
  <div class="panel-card">
    <form method="post" class="clean-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Salvar cliente</button>
    </form>
  </div>
</article>
{% endblock %}
